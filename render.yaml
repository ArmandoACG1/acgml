services:
  - type: web
    name: acgml
    runtime: python
    region: oregon
    plan: free
    buildCommand: "pip install -r backend/requirements-prod.txt && cd frontend && npm install && npm run build"
    startCommand: "cd backend && uvicorn api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
